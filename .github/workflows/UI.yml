# Repository root = this folder (Kay_Student_Support_UI). GitHub reads .github/workflows from here.
name: UI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    name: Typecheck & Vite build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Upload dist (push to main/master only)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: kay-ui-dist
          path: dist
          retention-days: 14

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: docker build
        run: docker build -t kentassessment:ci .
